name: yt-dlp-swift
options:
  bundleIdPrefix: com.nagi.yt-dlp-swift
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  yt-dlp-swift:
    type: application
    platform: macOS
    sources:
      - path: yt-dlp-swift
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nagi.yt-dlp-swift
        PRODUCT_NAME: yt-dlp-swift
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: yt-dlp-swift/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: yt-dlp-swift/yt-dlp-swift.entitlements
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_APP_SANDBOX: NO
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_STRICT_CONCURRENCY: minimal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
